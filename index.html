<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>sohiradio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0A0A0A;
  --panel: #141416;
  --panel-2: #1C1C1F;
  --panel-3: #232326;
  --line: #2A2A2D;
  --line-soft: rgba(255,255,255,0.05);
  --text: #F5F3EE;
  --text-dim: #7A7A7E;
  --accent: #F5F3EE;
  --accent-dim: rgba(245, 243, 238, 0.4);
  --glow: rgba(245, 243, 238, 0.18);
}

body {
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,255,255,0.05), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.07;
  z-index: 999;
  background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSdub2lzZSc+PGZlVHVyYnVsZW5jZSB0eXBlPSdmcmFjdGFsTm9pc2UnIGJhc2VGcmVxdWVuY3k9JzAuOScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScxMDAlJyBoZWlnaHQ9JzEwMCUnIGZpbHRlcj0ndXJsKCNub2lzZSknLz48L3N2Zz4=");
}

.window {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(180deg, var(--panel-3), var(--panel) 40%);
  border: 1px solid var(--line);
  border-radius: 3px;
  box-shadow:
    0 40px 80px -20px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.02) inset,
    0 1px 0 rgba(255,255,255,0.04) inset;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
}

.titlebar-left { display: flex; align-items: center; gap: 8px; }

.dot { width: 7px; height: 7px; background: var(--line); }
.dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

.titlebar-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.02em; }

.titlebar-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
}

/* ===== TAB CONTENT ===== */
/* --- Player tab --- */
.content { padding: 28px 26px 22px; }

.wordmark {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  font-size: 34px;
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--text);
}

/* ---- TV frame ---- */
.tv-frame {
  background: linear-gradient(160deg, #1a1a1c, #0f0f10);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 10px 12px;
  box-shadow: 0 20px 40px -16px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.05) inset;
}
.tv-caption {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 4px;
}
.tv-caption-bottom { text-align: right; }
.tv-caption-bottom span { opacity: 0.5; margin: 0 4px; }
.tv-screen {
  position: relative;
  background: radial-gradient(ellipse at 50% 30%, #1e1e20, #08080a 75%);
  border: 1px solid rgba(0,0,0,0.6);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset, 0 30px 50px -20px rgba(0,0,0,0.8) inset;
  border-radius: 2px;
  min-height: 190px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  overflow: hidden;
}
.tv-wordmark {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  font-size: 30px;
  letter-spacing: -0.01em;
  color: var(--text);
  z-index: 1;
}
.tv-visualizer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 44%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  padding: 0 20px 14px;
  opacity: 0.55;
}
.tv-visualizer.off { display: none; }
.tv-vis-bar {
  width: 4px;
  background: linear-gradient(180deg, rgba(245,243,238,0.05), rgba(245,243,238,0.5));
  border-radius: 1px;
  transition: height 0.15s ease;
}
.tv-vis-toggle {
  position: absolute;
  top: 8px; right: 8px;
  width: 22px; height: 22px;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.tv-vis-toggle svg { width: 12px; height: 12px; }
.tv-vis-toggle.active { color: var(--text); border-color: rgba(245,243,238,0.3); }

/* ---- channel selector ---- */
.channel-row {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0;
}
.channel-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em;
  flex-shrink: 0;
}
.channel-select {
  flex: 1;
  appearance: none;
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  padding: 9px 12px;
  border-radius: 2px;
  cursor: pointer;
}

/* ---- track card ---- */
.track-card {
  display: flex; align-items: flex-start; gap: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.015);
  border-radius: 2px;
  padding: 16px;
  margin-bottom: 18px;
}
.track-info { flex: 1; min-width: 0; }
.np-label { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text); font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.np-title { font-weight: 500; font-size: 15.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.track-time-row { display: flex; justify-content: space-between; margin-top: 10px; }
.time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

.track-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.track-action-btn {
  width: 30px; height: 30px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.track-action-btn:hover { color: var(--text); border-color: rgba(245,243,238,0.3); }
.track-action-btn.active { color: var(--text); border-color: rgba(245,243,238,0.4); box-shadow: 0 0 10px var(--glow); }
.track-action-btn svg { width: 14px; height: 14px; }

/* ---- transport tiles ---- */
.transport-row {
  display: flex; align-items: stretch; gap: 8px;
  margin-bottom: 16px;
}
.transport-tile {
  flex: 1;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 2px;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  height: 52px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
}
.transport-tile svg { width: 18px; height: 18px; }
.transport-tile.active {
  background: linear-gradient(180deg, var(--panel-3), var(--panel-2));
  color: var(--text);
  box-shadow: 0 0 16px var(--glow), 0 1px 0 rgba(255,255,255,0.06) inset;
}
.transport-side { display: flex; gap: 8px; }
.transport-side .icon-btn {
  width: 44px; height: 52px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
}
.transport-side .icon-btn svg { width: 15px; height: 15px; }

.icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; display: flex; padding: 4px; }
.icon-btn:hover { color: var(--text); }
.icon-btn svg { width: 15px; height: 15px; }

@media (max-width: 480px) {
  body { padding: 0; align-items: stretch; }
  .window { max-width: 100%; min-height: 100vh; min-height: 100dvh; justify-content: space-between; }
  .content { padding: 26px 20px 20px; }
  .wordmark { font-size: 42px; }
  .tv-screen { min-height: 220px; }
  .tv-wordmark { font-size: 34px; }
  .tv-visualizer { padding: 0 16px 16px; }
  .np-title { font-size: 17px; }
  .np-artist { font-size: 13px; }
  .np-label { font-size: 10.5px; }
  .time { font-size: 11px; }
  .transport-tile { height: 58px; }
  .transport-tile svg { width: 20px; height: 20px; }
  .transport-side .icon-btn { height: 58px; width: 48px; }
  .icon-btn svg { width: 19px; height: 19px; }
  .icon-btn { padding: 8px; }
}
/* ===== BOOT SCREEN ===== */
.boot-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.5s ease;
}
.boot-screen.hidden { opacity: 0; pointer-events: none; }
.boot-icon {
  width: 46px; height: 46px;
  color: var(--text);
  animation: bootPulse 1.8s ease-in-out infinite;
}
.boot-icon svg { width: 100%; height: 100%; }
@keyframes bootPulse {
  0%, 100% { opacity: 0.35; transform: scale(0.94); }
  50% { opacity: 1; transform: scale(1); }
}
.boot-wordmark {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  font-size: 26px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.boot-tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.boot-dots span {
  animation: bootDots 1.4s infinite;
  opacity: 0;
}
.boot-dots span:nth-child(1) { animation-delay: 0s; }
.boot-dots span:nth-child(2) { animation-delay: 0.2s; }
.boot-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bootDots {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
.boot-footer {
  position: absolute;
  bottom: 40px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.5;
}
</style>

<body>

<div class="boot-screen" id="bootScreen">
  <div class="boot-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/>
      <path d="M8.5 8.5a5 5 0 000 7"/>
      <path d="M15.5 8.5a5 5 0 010 7"/>
      <path d="M5.5 5.5a9 9 0 000 13"/>

    </svg>

</div>

<div class="window">
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="dot live" id="liveDot"></div>
      <div class="titlebar-text">sohiradio.stream — v0.2</div>
    </div>
    <div class="titlebar-status" id="statusText">● LIVE</div>
  </div>

  <div class="content">
    <div class="tv-frame">
      <div class="tv-caption tv-caption-top" id="clockCaption">--:--</div>
      <div class="tv-screen">
        <div class="tv-wordmark">sohiradio.</div>
        <div class="tv-visualizer" id="tvVisualizer"></div>
        <button class="tv-vis-toggle" id="visToggle" title="toggle visualizer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h3l2-7 4 14 3-10 2 3h4"/></svg>
        </button>
      </div>

      <span class="channel-label">Channel</span>
      <select id="channelSelect" class="channel-select">
        <option>sohiradio — default</option>
      </select>
    </div>

    <div class="track-card">
      <div class="track-info">
        <div class="np-label"><span id="npIcon">◌</span> <span id="npLabel">STANDBY</span></div>
        <div class="np-title" id="npTitle">tap play to tune in</div>
        <div class="np-artist" id="npArtist">sohiradio</div>
        <div class="track-time-row">
          <span class="time" id="curTime">0:00</span>
          <span class="time" id="durTime">0:00</span>
        </div>
      </div>
      <div class="track-actions">
        <button class="track-action-btn" id="soundcloudLinkBtn" title="open in soundcloud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 5l6 6-6 6M20 11H4"/></svg>

      </button>

<video id="audioEl" preload="none" style="display:none;width:0;height:0;" playsinline></video>

<script>
/* ---------- sohiradio audio engine (real SoundCloud API, real <audio> element) ---------- */
/* Swap this for your actual "sohiradio-default" playlist URL. */
const AMBIENT_SET_URL = "https://soundcloud.com/sohisounds/sets/sohiradio-default";

const audioEl = document.getElementById('audioEl');
audioEl.setAttribute('crossorigin', 'anonymous');

// Safari (desktop + iOS) supports HLS natively. Every other browser
// (Chrome, Arc, Firefox, Edge) needs hls.js to play .m3u8 streams at all.
const supportsNativeHls = audioEl.canPlayType('application/vnd.apple.mpegurl') !== '';
let hls = null;

function loadHlsJsIfNeeded(callback) {
  if (supportsNativeHls || window.Hls) { callback(); return; }
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
  script.onload = callback;
  script.onerror = () => {
    console.error('Failed to load hls.js');
    callback();
  };
  document.head.appendChild(script);
}

function setStreamSource(url, autoplay) {
  if (supportsNativeHls) {
    audioEl.src = url;
    if (autoplay) audioEl.play().catch(() => {});
    return;
  }
  loadHlsJsIfNeeded(() => {
    if (!window.Hls || !window.Hls.isSupported()) {
      // Last-resort fallback — probably won't work, but don't just silently fail.
      audioEl.src = url;
      if (autoplay) audioEl.play().catch(() => {});
      return;
    }
    if (hls) hls.destroy();
    hls = new window.Hls();
    hls.loadSource(url);
    hls.attachMedia(audioEl);
    if (autoplay) {
      hls.once(window.Hls.Events.MANIFEST_PARSED, () => {
        audioEl.play().catch(() => {});
      });
    }
  });
}
const playTile = document.getElementById('playTile');
const pauseTile = document.getElementById('pauseTile');
const npLabel = document.getElementById('npLabel');
const npIcon = document.getElementById('npIcon');
const npTitle = document.getElementById('npTitle');
const npArtist = document.getElementById('npArtist');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const statusText = document.getElementById('statusText');

let isPlaying = false;
let hasStarted = false;
let queue = [];          // lightweight track summaries from resolve-playlist
let currentTrack = null; // full details of the currently loaded track
let currentPermalinkUrl = "";

npTitle.textContent = "loading playlist...";

function hideBootScreen() {
  const boot = document.getElementById('bootScreen');
  if (!boot) return;
  boot.classList.add('hidden');
  setTimeout(() => { boot.style.display = 'none'; }, 550);
}
// Safety net so nobody's stuck on the boot screen if a request is slow/fails.
setTimeout(hideBootScreen, 8000);

async function loadQueue() {
  try {
    const resp = await fetch(`/.netlify/functions/resolve-playlist?url=${encodeURIComponent(AMBIENT_SET_URL)}`);
    if (!resp.ok) throw new Error(`resolve-playlist failed: ${resp.status}`);
    const data = await resp.json();
    queue = (data.tracks || []).filter((t) => t.streamable);
    if (queue.length === 0) throw new Error("Playlist resolved but has no streamable tracks.");
    hideBootScreen();
    tryAutoplay();
  } catch (err) {
    console.error(err);
    npTitle.textContent = "couldn't load playlist";
    npArtist.textContent = err.message || "";
    hideBootScreen();
  }
}
loadQueue();

function pickNextTrackId(excludeId) {
  if (queue.length === 1) return queue[0].id;
  let pick = queue[Math.floor(Math.random() * queue.length)];
  while (pick.id === excludeId) pick = queue[Math.floor(Math.random() * queue.length)];
  return pick.id;
}

async function loadAndPlayTrack(trackId, attemptPlay) {
  npLabel.textContent = 'CONNECTING';
  npTitle.textContent = "tuning in...";
  try {
    const resp = await fetch(`/.netlify/functions/track-stream?id=${trackId}`);
    if (!resp.ok) {
      const errBody = await resp.json().catch(() => ({}));
      throw new Error(errBody.error || `track-stream failed: ${resp.status}`);
    }
    const data = await resp.json();
    currentTrack = data;
    currentPermalinkUrl = data.permalinkUrl || "";

    npTitle.textContent = data.title;
    npArtist.textContent = data.artist;
    updateMediaSessionMetadata(data);

    const proxiedUrl = `/.netlify/functions/stream-proxy?url=${encodeURIComponent(data.streamUrl)}`;
    setStreamSource(proxiedUrl, attemptPlay);
  } catch (err) {
    console.error(err);
    npTitle.textContent = "couldn't play this track";
    npArtist.textContent = err.message || "";
    npLabel.textContent = 'STANDBY';
    // Try a different track rather than getting stuck on one that failed.
    if (queue.length > 1) {
      setTimeout(() => loadAndPlayTrack(pickNextTrackId(trackId), attemptPlay), 800);
    }
  }
}

function playRandomTrack() {
  hasStarted = true;
  const id = pickNextTrackId(currentTrack ? currentTrack.id : null);
  loadAndPlayTrack(id, true);
}

function tryAutoplay() {
  playRandomTrack();
}

function updateMediaSessionMetadata(track) {
  if (!('mediaSession' in navigator)) return;
  let artwork = [];
  if (track.artworkUrl) {
    artwork = [{ src: track.artworkUrl, sizes: '500x500', type: 'image/jpeg' }];
  }
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title || "untitled",
    artist: track.artist || "sohiradio",
    album: "sohiradio.",
    artwork: artwork,
  });
}

if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => startOrToggle(true));
  navigator.mediaSession.setActionHandler('pause', () => startOrToggle(false));
  navigator.mediaSession.setActionHandler('previoustrack', () => nextTrack());
  navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
}

function nextTrack() {
  if (queue.length === 0) return;
  const id = pickNextTrackId(currentTrack ? currentTrack.id : null);
  loadAndPlayTrack(id, isPlaying || !hasStarted);
}

function formatTime(s) {
  if (!isFinite(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function setPlayingUI(playing) {
  isPlaying = playing;
  playTile.classList.toggle('active', playing);
  pauseTile.classList.toggle('active', !playing);
  npLabel.textContent = playing ? 'ON AIR' : 'PAUSED';
  npIcon.textContent = playing ? '●' : '◌';
  statusText.textContent = playing ? '● LIVE' : '○ STANDBY';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
  }
}
setPlayingUI(false);

audioEl.addEventListener('play', () => setPlayingUI(true));
audioEl.addEventListener('pause', () => setPlayingUI(false));
audioEl.addEventListener('ended', () => nextTrack());
audioEl.addEventListener('timeupdate', () => {
  curTime.textContent = formatTime(audioEl.currentTime);
  if (isFinite(audioEl.duration)) durTime.textContent = formatTime(audioEl.duration);
});

function startOrToggle(forcePlay) {
  if (queue.length === 0) return;
  if (!hasStarted && forcePlay) { playRandomTrack(); return; }
  if (forcePlay) audioEl.play().catch(() => {}); else audioEl.pause();
}

playTile.addEventListener('click', () => startOrToggle(true));
pauseTile.addEventListener('click', () => startOrToggle(false));
document.getElementById('prevBtn').addEventListener('click', () => nextTrack());
document.getElementById('skipBtn').addEventListener('click', () => nextTrack());

document.getElementById('soundcloudLinkBtn').addEventListener('click', () => {
  if (currentPermalinkUrl) window.open(currentPermalinkUrl, '_blank');
});

/* ---------- CLOCK (top caption) ---------- */
function updateClock() {
  const now = new Date();
  document.getElementById('clockCaption').textContent =
    now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

/* ---------- LOCATION (bottom caption) ---------- */
(function setLocationCaption() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    const parts = tz.split('/');
    const place = (parts[parts.length - 1] || "").replace(/_/g, ' ');
    document.getElementById('locationCaption').textContent = place ? place.toUpperCase() : "SOHISOUNDS.";
  } catch (e) {
    document.getElementById('locationCaption').textContent = "SOHISOUNDS.";
  }
})();

/* ---------- IN-SCREEN AUDIO-REACTIVE VISUALIZER ---------- */
const tvVisualizer = document.getElementById('tvVisualizer');
const visToggle = document.getElementById('visToggle');
let visualizerOn = true;
const visBarCount = 28;
const visBars = [];
for (let i = 0; i < visBarCount; i++) {
  const bar = document.createElement('div');
  bar.className = 'tv-vis-bar';
  bar.style.height = '4px';
  tvVisualizer.appendChild(bar);
  visBars.push(bar);
}
visToggle.classList.add('active');

function animateVisualizer() {
  if (visualizerOn && isPlaying) {
    visBars.forEach(bar => { bar.style.height = (4 + Math.random() * 34) + 'px'; });
  } else if (!isPlaying) {
    visBars.forEach(bar => { bar.style.height = '4px'; });
  }
}
setInterval(animateVisualizer, 140);

visToggle.addEventListener('click', () => {
  visualizerOn = !visualizerOn;
  visToggle.classList.toggle('active', visualizerOn);
  tvVisualizer.classList.toggle('off', !visualizerOn);
});

/* ---------- AUTOPLAY FALLBACK ----------
   Mobile browsers block sound autoplay before any user interaction. We try
   immediately once the queue loads; if that's blocked, the first tap/touch
   anywhere on the page unlocks it. Fires once, never interferes with a
   deliberate pause later. */
function unlockAutoplay() {
  if (isPlaying || queue.length === 0) return;
  if (!hasStarted) playRandomTrack();
  else audioEl.play().catch(() => {});
}
document.addEventListener('touchstart', unlockAutoplay, { once: true, passive: true });
document.addEventListener('click', unlockAutoplay, { once: true });
</script>
