<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>sohiradio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

/* Flat surface: one background, one hairline, no simulated depth anywhere.
   No gradients, no shadows, no glows, no radii — structure comes from
   rules, spacing and type weight alone. */
:root {
  --bg: #0A0A0A;
  --text: #F5F3EE;
  --text-dim: #7A7A7E;
  --line: rgba(245, 243, 238, 0.12);
  --line-soft: rgba(245, 243, 238, 0.06);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  text-transform: lowercase; /* the whole surface reads lowercase, track titles included */
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Grain is surface texture, not a depth cue — it survives the flat pass,
   dialled back from 0.07 so it reads as film stock rather than dirt. */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.04;
  z-index: 999;
  background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSdub2lzZSc+PGZlVHVyYnVsZW5jZSB0eXBlPSdmcmFjdGFsTm9pc2UnIGJhc2VGcmVxdWVuY3k9JzAuOScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScxMDAlJyBoZWlnaHQ9JzEwMCUnIGZpbHRlcj0ndXJsKCNub2lzZSknLz48L3N2Zz4=");
}

/* The wordmark matches the treatment burned into the photography:
   upright bold "sohi", bold italic "radio", upright period. */
.wm { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
.wm em { font-style: italic; font-weight: 700; }

/* No menubar. Nothing at the top of the screen asks to be clicked — this is
   something you leave on, not something you navigate.
   #statusText is still written on every play/pause by setPlayingUI, and
   #liveDot has no JS binding at all; both stay in the DOM purely so the
   engine keeps working. The state a listener actually reads is #npLabel
   ("on air" / "paused" / "buffering") directly above the title. */
#liveDot, #statusText { display: none; }

/* ===== STAGE ===== */
/* No window, no panel, no frame — a single centred column. */
/* The whole player is one centred cluster — the slack collects outside it,
   at the top and bottom, instead of being trapped between the elements. */
.stage {
  max-width: 560px;
  margin: 0 auto;
  /* Symmetric gutters — with no menubar the cluster centres on the true
     viewport. Deliberately no safe-area term here: it only exists at the
     bottom, and putting it in this padding is what was dragging the
     cluster upward on a real phone. The colophon carries its own inset. */
  padding: 40px 20px;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  position: relative;
}
.player {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 34px;
}
.wordmark {
  font-size: clamp(44px, 13vw, 76px);
  line-height: 0.92;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  display: inline-block;   /* transforms need a block box; centred by the stage */
  align-self: center;
}

/* ---- wordmark easter egg: each tap cycles the next one ---- */
.wordmark.fx-glitch  { animation: fxGlitch 0.55s steps(2, end) 2; }
.wordmark.fx-stretch { animation: fxStretch 0.9s cubic-bezier(.4,0,.2,1); }
.wordmark.fx-invert  { animation: fxInvert 0.7s steps(1, end) 3; }
.wordmark.fx-tilt    { animation: fxTilt 0.8s cubic-bezier(.36,.07,.19,.97); }
.wordmark.fx-echo    { animation: fxEcho 1s ease-out; }
.wordmark.fx-flip    { animation: fxFlip 0.9s cubic-bezier(.4,0,.2,1); }

@keyframes fxGlitch {
  0%   { transform: translate(0); clip-path: inset(0 0 0 0); }
  20%  { transform: translate(-5px, 1px); clip-path: inset(18% 0 52% 0); }
  40%  { transform: translate(5px, -1px); clip-path: inset(56% 0 14% 0); }
  60%  { transform: translate(-3px, 0);   clip-path: inset(34% 0 38% 0); }
  80%  { transform: translate(3px, 1px);  clip-path: inset(8% 0 74% 0); }
  100% { transform: translate(0); clip-path: inset(0 0 0 0); }
}
@keyframes fxStretch {
  0%, 100% { letter-spacing: -0.02em; transform: scaleX(1); }
  45%      { letter-spacing: 0.16em;  transform: scaleX(1.06); }
}
@keyframes fxInvert {
  0%, 100% { background: transparent; color: var(--text); box-decoration-break: clone; }
  50%      { background: var(--text); color: var(--bg); }
}
@keyframes fxTilt {
  0%, 100% { transform: skewX(0) rotate(0); }
  25%      { transform: skewX(-12deg) rotate(-2deg); }
  60%      { transform: skewX(7deg) rotate(1.5deg); }
}
@keyframes fxEcho {
  0%   { text-shadow: none; }
  35%  { text-shadow: 6px 0 var(--text-dim), -6px 0 var(--text-dim); }
  70%  { text-shadow: 16px 0 rgba(245,243,238,0.25), -16px 0 rgba(245,243,238,0.25); }
  100% { text-shadow: none; }
}
@keyframes fxFlip {
  0%   { transform: perspective(600px) rotateX(0); }
  50%  { transform: perspective(600px) rotateX(90deg); }
  100% { transform: perspective(600px) rotateX(360deg); }
}

.now-label {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.16em;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-bottom: 12px;
}
.now-title {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* Clickable only when there's somewhere to go — the underline is the whole
   affordance, so it must not appear on status text or station IDs. */
.now-title.is-linked {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 5px;
  text-decoration-color: var(--line);
  transition: text-decoration-color 0.15s;
}
.now-title.is-linked:hover { text-decoration-color: var(--text-dim); }
.now-artist { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

/* ===== METER ===== */
.progress { height: 2px; background: var(--line); overflow: hidden; }
.progress-fill { height: 100%; width: 0; background: var(--text); transition: width 0.25s linear; }
.times {
  display: flex;
  justify-content: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 12px;
}
.times span:nth-child(2) { opacity: 0.4; }

/* ===== TRANSPORT ===== */
/* One evenly-spaced row with a solid primary at the centre of gravity.
   Still flat — the circle is a solid fill, no gradient, shadow or glow. */
.transport {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}
/* Utilities sit centred in their own third rather than jammed against the
   gutter — with AirPlay usually absent, an edge-pinned icon reads as a
   stray rather than a pair. */
.tzone { display: flex; align-items: center; justify-content: center; }
.tcore { display: flex; align-items: center; gap: 16px; }
.tbtn {
  width: 48px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  background: none;
  border: 0;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.15s, opacity 0.15s;
  flex: none;
}
.tbtn:hover { color: var(--text); }
.tbtn.active { color: var(--text); }
.tbtn svg { width: 20px; height: 20px; }
.tbtn--step { color: var(--text); }         /* prev / next sit at full strength */
.tbtn--step svg { width: 30px; height: 30px; }

/* playTile and pauseTile are separate elements the engine drives by id, so
   they're stacked into a single circle and swapped in CSS: whichever action
   is available is the one on screen. Sibling order matters — playTile first. */
.tbtn--primary {
  width: 66px; height: 66px;
  background: var(--text);
  color: var(--bg);
  border-radius: 50%;
  transition: transform 0.12s ease;
}
.tbtn--primary svg { width: 26px; height: 26px; }
.tbtn--primary:hover { color: var(--bg); }
.tbtn--primary:active { transform: scale(0.94); }
#playTile { display: flex; }
#playTile.active { display: none; }          /* playing → offer pause instead */
#pauseTile { display: none; }
#playTile.active ~ #pauseTile { display: flex; }
#playTile svg { margin-left: 3px; }          /* optical centre of the triangle */

/* AirPlay: hidden unless the browser reports a routable target nearby.
   Its zone holds the space either way, so the primary stays centred. */
#airplayBtn { display: none; }
#airplayBtn.available { display: flex; }

.colophon {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  opacity: 0.55;
  position: absolute;
  left: 0; right: 0;
  bottom: calc(20px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  gap: 10px;
  white-space: nowrap;
}
.colophon span { opacity: 0.5; }
.colophon a { color: inherit; text-decoration: none; transition: color 0.15s; }
.colophon a:hover { color: var(--text); }

@media (max-width: 480px) {
  .player { gap: 30px; }
  .now-title { font-size: 18px; }
}

/* ===== BOOT SCREEN ===== */
/* The photograph carries the wordmark already — it *is* the title card,
   so there's no DOM wordmark or icon here, only mono microcopy. */
.boot-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  overflow: hidden;
  transition: opacity 0.5s ease;
}
.boot-screen.hidden { opacity: 0; pointer-events: none; }
.boot-photo {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: 0;
  transition: opacity 0.7s ease;
  animation: bootPush 16s ease-out forwards;
}
.boot-photo.shown { opacity: 1; }
@keyframes bootPush { from { transform: scale(1); } to { transform: scale(1.05); } }
/* Guarantees the microcopy stays legible over any exposure in the set */
.boot-scrim {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.35) 26%, rgba(10,10,10,0) 52%);
}
.boot-meta {
  position: absolute;
  left: 20px;
  bottom: calc(52px + env(safe-area-inset-bottom));
}
.boot-tagline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.12em;
}
.boot-dots span { animation: bootDots 1.4s infinite; opacity: 0; }
.boot-dots span:nth-child(1) { animation-delay: 0s; }
.boot-dots span:nth-child(2) { animation-delay: 0.2s; }
.boot-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bootDots { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
.boot-cue {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-dim);
  letter-spacing: 0.14em;
  margin-top: 10px;
  opacity: 0.5;
}
.boot-cue.ready { color: var(--text); animation: cuePulse 2.2s ease-in-out infinite; }
.boot-footer {
  position: absolute;
  left: 20px;
  bottom: calc(22px + env(safe-area-inset-bottom));
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  opacity: 0.5;
}

.tap-cue {
  position: fixed;
  left: 20px; right: 20px;
  bottom: calc(22px + env(safe-area-inset-bottom));
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-dim);
  letter-spacing: 0.14em;
  pointer-events: none;
  z-index: 9000;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.tap-cue.visible { animation: cuePulse 2.2s ease-in-out infinite; }
@keyframes cuePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

@media (prefers-reduced-motion: reduce) {
  .boot-photo { animation: none; }
  .boot-dots span, .boot-cue.ready, .tap-cue.visible { animation: none; opacity: 1; }
  .progress-fill { transition: none; }
}
</style>

<script>
/* Boot artwork is picked before first paint so the preload hint goes out in
   the same breath as the document — the photo is the largest thing on the
   entry screen and it should be in flight before the playlist request is.
   Only the one chosen image is ever fetched. */
(function () {
  var COUNT = 6;
  var W_FULL = 1080, W_HALF = 720;   /* bump both when larger exports land */
  var n = 1 + Math.floor(Math.random() * COUNT);
  var full = '/assets/boot/boot-' + n + '.jpg';
  var half = '/assets/boot/boot-' + n + '@1x.jpg';
  var srcset = half + ' ' + W_HALF + 'w, ' + full + ' ' + W_FULL + 'w';

  var link = document.createElement('link');
  link.rel = 'preload';
  link.as = 'image';
  link.href = full;
  link.imageSrcset = srcset;
  link.imageSizes = '100vw';
  document.head.appendChild(link);

  document.addEventListener('DOMContentLoaded', function () {
    var img = document.getElementById('bootPhoto');
    if (!img) return;
    img.addEventListener('load', function () { img.classList.add('shown'); }, { once: true });
    img.sizes = '100vw';
    img.srcset = srcset;
    img.src = full;
  });
})();
</script>
</head>
<body>

<!-- Entry gate: holds until the visitor taps, so the photograph is the
     title card rather than a loading spinner. -->
<div class="boot-screen" id="bootScreen">
  <img class="boot-photo" id="bootPhoto" alt="" decoding="async" fetchpriority="high">
  <div class="boot-scrim"></div>
  <div class="boot-meta">
    <div class="boot-tagline">tuning frequencies<span class="boot-dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="boot-cue" id="bootCue">warming up…</div>
  </div>
  <div class="boot-footer">powered by soundcloud.</div>
</div>

<div class="tap-cue" id="tapCue">tap play to tune in</div>

<!-- Engine-driven, never shown: see the #liveDot / #statusText note in the CSS -->
<div id="liveDot"></div>
<div id="statusText">● live</div>

<main class="stage">
  <div class="player">
  <h1 class="wordmark wm">sohi<em>radio</em>.</h1>

  <div class="now">
    <div class="now-label"><span id="npIcon">◌</span> <span id="npLabel">standby</span></div>
    <div class="now-title" id="npTitle">tap play to tune in</div>
    <div class="now-artist" id="npArtist">sohiradio</div>
  </div>

  <div class="meter">
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="times">
      <span id="curTime">0:00</span>
      <span>·</span>
      <span id="durTime">0:00</span>
    </div>
  </div>

  <!-- 3 zones so the primary stays dead centre no matter which utility
       buttons are visible -->
  <div class="transport">
    <div class="tzone tzone--left"></div>
    <div class="tcore">
      <button class="tbtn tbtn--step" id="prevBtn" title="previous">
        <svg viewBox="0 0 24 24" fill="currentColor" style="transform:scaleX(-1)"><path d="M6 5v14l8-7-8-7zM16 5v14h2V5h-2z"/></svg>
      </button>
      <button class="tbtn tbtn--primary" id="playTile" title="play">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="tbtn tbtn--primary" id="pauseTile" title="pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="tbtn tbtn--step" id="skipBtn" title="next track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14l8-7-8-7zM16 5v14h2V5h-2z"/></svg>
      </button>
    </div>
    <div class="tzone tzone--right">
      <button class="tbtn" id="airplayBtn" title="airplay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/><path d="M12 14.5l5.5 6.5h-11l5.5-6.5z"/></svg>
      </button>
    </div>
  </div>
  </div>

  <div class="colophon">
    <div>sohiradio.stream v0.2</div>
    <span>·</span>
    <div id="clockCaption">--:--</div>
    <span>·</span>
    <a href="https://soundcloud.com/sohiradio" target="_blank" rel="noopener">soundcloud ↗</a>
  </div>
</main>

<!-- <audio>, not <video>: iOS classifies the session as music, which is
     what makes the lock screen show prev/next track controls instead of
     the video-style ±10s skip buttons. -->
<audio id="audioEl" preload="auto" style="display:none;"></audio>

<script>
/* ---------- sohiradio audio engine (real SoundCloud API, real <audio> element) ---------- */
/* Swap this for your actual "sohiradio-default" playlist URL. */
const AMBIENT_SET_URL = "https://soundcloud.com/sohiradio/sets/sohiradio-default";
/* Station IDs: a separate playlist of interstitials, one of which plays
   every 4–8 songs. It's a private playlist, so this is its secret share
   link (the /s-XXXX path segment is what grants access). If it ever stops
   resolving, the feature just goes dormant. */
const STATION_ID_SET_URL = "https://soundcloud.com/sohiradio/sets/station-ids/s-mRpzkX2hfvo";

const audioEl = document.getElementById('audioEl');
audioEl.setAttribute('crossorigin', 'anonymous');

/* Claim a real media-app audio session where supported (iOS/Safari 17+).
   This is the same AVAudioSession machinery native music apps use: audio
   plays through the ring/silent switch, and the session state tells us
   when a call/Siri interruption ENDS so we can resume like Spotify does. */
try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch (e) {}

/* iOS ignores element volume (locked to 1) — and some versions *report*
   the value you set while ignoring it audibly, so pair the readback probe
   with a device check. Where volume isn't ours, fades become instant
   pause/play rather than a silent 220ms delay. */
const isIOSDevice = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
  (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.platform)); // iPadOS masquerades as Mac
let volumeControllable = false;
try {
  audioEl.volume = 0.5;
  volumeControllable = !isIOSDevice && Math.abs(audioEl.volume - 0.5) < 0.01;
  audioEl.volume = 1;
} catch (e) {}

/* Spotify-style micro-fade on pause/resume: softens the hard edge instead
   of chopping the waveform. No-op where volume is uncontrollable. */
const FADE_MS = 220;
let fadeTimer = null;
function cancelFade() {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  if (volumeControllable) audioEl.volume = 1;
}
function fadeTo(target, done) {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
  if (!volumeControllable) { if (done) done(); return; }
  const start = audioEl.volume;
  const steps = Math.max(1, Math.round(FADE_MS / 25));
  let n = 0;
  fadeTimer = setInterval(() => {
    n++;
    audioEl.volume = start + (target - start) * (n / steps);
    if (n >= steps) {
      clearInterval(fadeTimer);
      fadeTimer = null;
      if (done) done();
    }
  }, 25);
}
function pauseWithFade() {
  if (audioEl.paused) return;
  fadeTo(0, () => {
    userPauseIntent = true;
    audioEl.pause();
    if (volumeControllable) audioEl.volume = 1; // silent while paused; ready for resume
  });
}
function playWithFade() {
  if (volumeControllable && audioEl.paused) audioEl.volume = 0;
  audioEl.play().then(() => {
    fadeTo(1);
  }).catch((err) => {
    cancelFade();
    if (err && err.name === 'NotAllowedError') { showCueIfBlocked(err); return; }
    // AbortError means a newer load replaced the source mid-play — that
    // load owns the element now. Any OTHER rejection on a resume attempt
    // means the source is dead (expired stream URL): refetch this same
    // track at this same position instead of failing silently.
    if (err && err.name !== 'AbortError' &&
        hasStarted && currentTrack && audioEl.paused && !pendingPlayIntent) {
      startInPlaceResume(audioEl.currentTime);
    }
  });
}

// Safari (desktop + iOS) supports HLS natively. Every other browser
// (Chrome, Arc, Firefox, Edge) needs hls.js to play .m3u8 streams at all.
const supportsNativeHls = audioEl.canPlayType('application/vnd.apple.mpegurl') !== '';
let hls = null;

/* ---------- AUDIO NORMALIZATION ----------
   librespot normalises every track toward a common loudness before its
   mixer. SoundCloud's API exposes no per-track loudness data, so the
   browser equivalent is a gentle real-time leveler: MediaElementSource →
   DynamicsCompressor → destination. Capturing an element into WebAudio
   silences its direct output — that would break Safari's AirPlay routing
   and risk iOS lock-screen/background playback — so this runs ONLY on the
   hls.js (MSE) browsers, where there's nothing to break and no CORS taint
   (the audio bytes already arrive via JS). Safari native HLS, desktop and
   iOS, plays untouched. */
const normalizationEnabled = !supportsNativeHls &&
  !!(window.AudioContext || window.webkitAudioContext);
let normalizationCtx = null;
function initNormalization() {
  if (!normalizationEnabled || normalizationCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  let source = null;
  try {
    normalizationCtx = new Ctx();
    source = normalizationCtx.createMediaElementSource(audioEl);
    const comp = normalizationCtx.createDynamicsCompressor();
    // Leveling, not pumping: soft knee, moderate ratio, slow-ish release.
    comp.threshold.value = -24;
    comp.knee.value = 30;
    comp.ratio.value = 4;
    comp.attack.value = 0.01;
    comp.release.value = 0.25;
    source.connect(comp);
    comp.connect(normalizationCtx.destination);
  } catch (e) {
    // A half-built graph leaves the element routed nowhere — restore a
    // direct path so audio keeps flowing, just unleveled.
    console.warn('normalization disabled:', e);
    if (source && normalizationCtx) {
      try { source.connect(normalizationCtx.destination); } catch (e2) {}
    }
  }
}

function loadHlsJsIfNeeded(callback) {
  if (supportsNativeHls || window.Hls) { callback(); return; }
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
  script.onload = callback;
  script.onerror = () => {
    console.error('Failed to load hls.js');
    callback();
  };
  document.head.appendChild(script);
}

let activeManifestBlobUrl = null; // blob: manifest currently owned by the element
function setStreamSource(url, autoplay) {
  hlsRecoveries = 0;
  cancelFade(); // a fade belonging to the previous track must not pause this one
  posAnchor = null; // never drift-compare the new track against the old anchor
  // The previous swap's blob manifest is unreferenced once a new source
  // replaces it — release it here, not at consumption time, because the
  // element may keep reading it right up to this moment.
  if (activeManifestBlobUrl && activeManifestBlobUrl !== url) {
    try { URL.revokeObjectURL(activeManifestBlobUrl); } catch (e) {}
    activeManifestBlobUrl = null;
  }
  if (url.indexOf('blob:') === 0) activeManifestBlobUrl = url;
  if (supportsNativeHls) {
    audioEl.src = url;
    if (autoplay) audioEl.play().catch(showCueIfBlocked);
    return;
  }
  loadHlsJsIfNeeded(() => {
    if (!window.Hls || !window.Hls.isSupported()) {
      // Last-resort fallback — probably won't work, but don't just silently fail.
      audioEl.src = url;
      if (autoplay) audioEl.play().catch(showCueIfBlocked);
      return;
    }
    if (hls) hls.destroy();
    // Double the default forward buffer (librespot's read-ahead spirit):
    // a network blip drains buffer instead of audio.
    hls = new window.Hls({ maxBufferLength: 60, backBufferLength: 30 });
    hls.on(window.Hls.Events.ERROR, (evt, data) => {
      if (!data.fatal) return;
      // Try hls.js's own in-place recovery a couple of times before
      // declaring the track dead and skipping.
      if (hlsRecoveries < 2) {
        hlsRecoveries++;
        if (data.type === window.Hls.ErrorTypes.NETWORK_ERROR) { hls.startLoad(); return; }
        if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) { hls.recoverMediaError(); return; }
      }
      handlePlaybackError(`hls fatal: ${data.type}/${data.details}`);
    });
    hls.loadSource(url);
    hls.attachMedia(audioEl);
    if (autoplay) {
      hls.once(window.Hls.Events.MANIFEST_PARSED, () => {
        audioEl.play().catch(showCueIfBlocked);
      });
    }
  });
}
const playTile = document.getElementById('playTile');
const pauseTile = document.getElementById('pauseTile');
const npLabel = document.getElementById('npLabel');
const npIcon = document.getElementById('npIcon');
const npTitle = document.getElementById('npTitle');
/* The track title doubles as the link out to SoundCloud. Only a real,
   linkable track earns the affordance — status text and station IDs
   (which have no permalink) must not look clickable. */
function setTitleLink(on) { npTitle.classList.toggle('is-linked', !!on); }
const npArtist = document.getElementById('npArtist');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const progressFill = document.getElementById('progressFill');
const statusText = document.getElementById('statusText');

let isPlaying = false;
let hasStarted = false;
let queue = [];          // lightweight track summaries from resolve-playlist
let idQueue = [];        // station-ID interstitials (empty = feature dormant)
let currentTrack = null; // full details of the currently loaded track
let currentIsStationId = false;
let gapCounted = false;  // current track already counted toward the ID gap
let currentPermalinkUrl = "";
let history = [];        // stack of previously played track ids (songs only)
let forwardStack = [];   // ids we prev'd out of; next/auto-advance retrace them
const MAX_HISTORY = 20;
let bootTapped = false;      // entry tap happened (possibly before ready)
let bootReady = false;       // boot preload settled; the entry tap starts music
let failureStreak = 0;   // consecutive tracks that failed to load or play
let hlsRecoveries = 0;   // in-track hls.js recovery attempts
let userPauseIntent = false;   // the next pause event is the listener's own doing
let systemInterrupted = false; // paused by a call/Siri/route change, not the user
let interruptedAt = 0;
let offlineHold = null;  // { at } — track position parked while offline
let pendingPlayIntent = false; // a load with intent-to-play is in flight (Spotify's LoadingPlay)
let pendingPlayTimer = null;   // safety net: settle the UI if such a load silently dies
let posAnchor = null;    // { at, pos } — last position pushed to the lock screen
let pausedAt = 0;        // wall-clock of the last REAL pause; 0 while playing
let lastMediaMetadata = null;  // for idempotent re-assert on 'playing'
let resumingSince = 0;   // a stale-URL resume is in flight (wall-clock start)
let resumePosSnapshot = 0;     // position captured when that resume started
const STALE_RESUME_MS = 10 * 60 * 1000; // paused longer → stream URL presumed expired
const POSITION_DRIFT_SEC = 1;  // librespot's lock-screen re-push threshold

/* A track died mid-flight (network drop, expired segment URL, decode
   problem). librespot re-requests the failed ranges instead of abandoning
   the track, so first try the same thing: re-resolve this track's stream
   once and pick up where it stopped. If that fails too (no successful
   playback in between resets the attempt), move on to another track —
   unless several in a row have failed, then stand by for a manual retry. */
let resumeAttempted = false;
function handlePlaybackError(context) {
  console.warn("playback error:", context);
  if (!hasStarted || queue.length === 0) return;
  // No network at all — nothing to skip to either. Park the position and
  // let the 'online' listener revive this same track when connectivity
  // returns, instead of churning through the whole failure budget.
  if (navigator.onLine === false) {
    npLabel.textContent = 'reconnecting';
    settlePendingPlayIntent(); // holding, not loading
    offlineHold = { at: audioEl.currentTime };
    return;
  }
  // A blob-manifest handoff that died before ever playing gets one retry
  // over the network before any of the heavier machinery below.
  if (tryBlobFallback()) return;
  // An error inside a stale-URL resume must stay on THIS song: retry the
  // refetch at the snapshotted position (the element may have reset
  // currentTime to 0), and if that also fails, stand by with the same
  // track loaded — never wander off to a different song mid-resume.
  if (resumingSince && Date.now() - resumingSince < 5000) {
    if (!resumeAttempted) {
      resumeAttempted = true;
      resumingSince = Date.now(); // keep the window open across the retry's fetch
      resumeCurrentTrackAt(resumePosSnapshot);
      return;
    }
    settlePendingPlayIntent();
    setPlayingUI(false);
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
    npTitle.textContent = "stream trouble — tap play to retry";
    setTitleLink(false);   // status text, not a linkable track
    npLabel.textContent = 'standby';
    resumingSince = 0;
    return;
  }
  const resumeAt = audioEl.currentTime;
  if (!resumeAttempted && currentTrack && currentTrack.id != null && resumeAt > 1) {
    resumeAttempted = true;
    resumeCurrentTrackAt(resumeAt);
    return;
  }
  failureStreak++;
  if (failureStreak >= Math.min(queue.length, 5)) {
    // Dead air must not keep saying "playing": settle everything and stop
    // offering the lock screen a pause button that would lie.
    settlePendingPlayIntent();
    setPlayingUI(false);
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
    npTitle.textContent = "stream trouble — tap play to retry";
    setTitleLink(false);   // status text, not a linkable track
    npLabel.textContent = 'standby';
    failureStreak = 0;
    return;
  }
  const pick = pickNext();
  loadAndPlayTrack(pick.id, true, pick.isStationId);
}

/* Fetch a fresh stream URL for the track that just died and seek back to
   where it stopped — the listener keeps their song across network blips. */
async function resumeCurrentTrackAt(positionSec) {
  const trackId = currentTrack.id;
  const isId = currentIsStationId;
  const wasCounted = gapCounted;
  const seq = ++loadSeq;
  try {
    const resp = await fetch(`/.netlify/functions/track-stream?id=${trackId}`);
    if (seq !== loadSeq) return; // a newer selection superseded the resume
    if (!resp.ok) throw new Error(`track-stream failed: ${resp.status}`);
    const data = await resp.json();
    if (seq !== loadSeq) return;
    applyLoadedTrack(trackId, data, true, isId);
    gapCounted = wasCounted; // same play — don't let it count twice
    audioEl.addEventListener('loadedmetadata', () => {
      if (seq !== loadSeq) return;
      if (isFinite(audioEl.duration)) {
        positionSec = Math.min(positionSec, Math.max(0, audioEl.duration - 1));
      }
      audioEl.currentTime = positionSec; // 'seeked' re-anchors the lock screen
    }, { once: true });
  } catch (err) {
    if (seq !== loadSeq) return;
    console.warn("in-place resume failed:", err);
    handlePlaybackError("resume refetch failed");
  }
}

/* A resume whose stream URL is presumed dead (long pause) or proved dead
   (play() rejected): refetch this same track and seek back, reporting
   'playing' optimistically so the lock-screen button doesn't hang on the
   fetch. resumingSince/resumePosSnapshot pin any failures during the
   window to THIS song — never a skip to a different one. */
function startInPlaceResume(positionSec) {
  if (!currentTrack) return;
  resumingSince = Date.now();
  resumePosSnapshot = positionSec;
  resumeAttempted = false; // a fresh user gesture earns a fresh budget
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  npLabel.textContent = 'connecting';
  resumeCurrentTrackAt(positionSec);
}

npTitle.textContent = "loading playlist...";
setTitleLink(false);   // status text, not a linkable track

function hideBootScreen() {
  const boot = document.getElementById('bootScreen');
  if (!boot) return;
  boot.classList.add('hidden');
  setTimeout(() => { boot.style.display = 'none'; }, 550);
}
// Safety net: if the playlist request hangs, fall through to the player's
// status text instead of a stuck boot screen. Once the queue has loaded,
// the boot screen stays up by design, waiting for the entry tap.
setTimeout(() => { if (queue.length === 0) hideBootScreen(); }, 8000);

async function loadQueue() {
  try {
    const resp = await fetch(`/.netlify/functions/resolve-playlist?url=${encodeURIComponent(AMBIENT_SET_URL)}`);
    if (!resp.ok) throw new Error(`resolve-playlist failed: ${resp.status}`);
    const data = await resp.json();
    queue = (data.tracks || []).filter((t) => t.streamable);
    if (queue.length === 0) throw new Error("Playlist resolved but has no streamable tracks.");
    loadIdQueue();
    // Restore transport continuity from the last session: prev history,
    // the forward trail, and where the station-ID cadence left off.
    const saved = loadSession();
    if (saved) {
      const valid = (id) => id != null && !isNaN(id);
      if (Array.isArray(saved.history)) history = saved.history.filter(valid).slice(-MAX_HISTORY);
      if (Array.isArray(saved.forwardStack)) forwardStack = saved.forwardStack.filter(valid).slice(-MAX_HISTORY);
      if (Number.isFinite(saved.songsUntilStationId)) {
        songsUntilStationId = Math.max(0, Math.min(STATION_ID_MAX_GAP, saved.songsUntilStationId));
      }
    }
    // The boot screen is the entry gate: it stays up until the visitor
    // taps, and the tap cue only appears once the first track is loaded
    // and ready to sound immediately.
    preloadFirstTrack();
  } catch (err) {
    console.error(err);
    npTitle.textContent = "couldn't load playlist";
    setTitleLink(false);   // status text, not a linkable track
    npArtist.textContent = err.message || "";
    hideBootScreen();
  }
}
loadQueue();

/* Station-ID playlist load is fire-and-forget: until the playlist exists
   and resolves, idQueue stays empty and the radio is all songs. */
async function loadIdQueue() {
  try {
    const resp = await fetch(`/.netlify/functions/resolve-playlist?url=${encodeURIComponent(STATION_ID_SET_URL)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    idQueue = (data.tracks || []).filter((t) => t.streamable);
  } catch (e) {}
}

function setBootCueReady() {
  bootReady = true;
  const bootCue = document.getElementById('bootCue');
  if (bootCue) {
    bootCue.textContent = 'tap anywhere to tune in';
    bootCue.classList.add('ready');
  }
}

/* Load the first track's stream while the boot screen is still up, so the
   entry tap goes straight to play() with the source already in place —
   no post-tap fetches, no silent gap. Reopens like Spotify: the song the
   listener left, at the position they left it. Only songs restore — a
   session closed during a station ID starts on a fresh pick instead. */
async function preloadFirstTrack() {
  const saved = loadSession();
  const resumable = saved && saved.trackId != null &&
    queue.some((t) => t.id === saved.trackId);
  const pick = resumable
    ? { id: saved.trackId, isStationId: false }
    : pickNext();
  const resumePos = resumable && Number.isFinite(saved.pos) && saved.pos > 5 ? saved.pos : 0;
  try {
    const resp = await fetch(`/.netlify/functions/track-stream?id=${pick.id}`);
    if (!resp.ok) throw new Error(`track-stream failed: ${resp.status}`);
    const data = await resp.json();
    loadSeq++; // invalidate anything else in flight
    if (bootTapped) {
      // The tap already happened (it was spent unlocking the element) —
      // don't wait for another one.
      hasStarted = true;
      hideBootScreen();
      applyLoadedTrack(pick.id, data, true, pick.isStationId);
    } else {
      applyLoadedTrack(pick.id, data, false, pick.isStationId);
      setBootCueReady();
    }
    if (resumePos) {
      audioEl.addEventListener('loadedmetadata', () => {
        let p = resumePos;
        if (isFinite(audioEl.duration)) p = Math.min(p, Math.max(0, audioEl.duration - 2));
        audioEl.currentTime = p; // 'seeked' re-anchors the lock screen
        // The song already earned its station-ID count last session.
        if (p >= GAP_COUNT_AT_SEC) gapCounted = true;
      }, { once: true });
    }
  } catch (err) {
    console.error("first-track preload failed:", err);
    // Fall back to the old behavior: the entry tap fetches fresh.
    if (bootTapped) {
      hideBootScreen();
      playRandomTrack();
    } else {
      setBootCueReady();
    }
  }
}

/* Shuffle bag: play every track once, in random order, before anything
   repeats. Refill + reshuffle when the bag empties; never let a new cycle
   open with the track that just finished. */
function shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
let shuffleBag = [];
function pickNextTrackId() {
  if (shuffleBag.length === 0) {
    shuffleBag = shuffleInPlace(queue.map((t) => t.id));
    if (shuffleBag.length > 1 && currentTrack && shuffleBag[0] === currentTrack.id) {
      shuffleBag.push(shuffleBag.shift());
    }
  }
  return shuffleBag.shift();
}

/* Every 4–8 songs (random each time), the next pick comes from the
   station-ID pool instead. Only songs that actually play for 30+ seconds
   count toward the gap (see the timeupdate watcher) — surfing past tracks
   doesn't hurry the next ID along. IDs have their own shuffle bag so they
   don't repeat until the whole pool has played. */
const STATION_ID_MIN_GAP = 4;
const STATION_ID_MAX_GAP = 8;
const GAP_COUNT_AT_SEC = 30; // a song must play this long to count
function randGap() {
  return STATION_ID_MIN_GAP +
    Math.floor(Math.random() * (STATION_ID_MAX_GAP - STATION_ID_MIN_GAP + 1));
}
/* The next track is prefetched ~30s before the END of the current one, so
   by the time the counter is consulted for slot N+1, the song in slot N
   has already counted itself (a song under a minute can pick before it
   counts — a harmless occasional off-by-one). Each reset to randGap()
   therefore means exactly that many counted songs before the next ID. */
let songsUntilStationId = randGap();
let idShuffleBag = [];
function pickNext() {
  if (idQueue.length > 0 && songsUntilStationId <= 0) {
    songsUntilStationId = randGap();
    if (idShuffleBag.length === 0) {
      idShuffleBag = shuffleInPlace(idQueue.map((t) => t.id));
    }
    return { id: idShuffleBag.shift(), isStationId: true };
  }
  return { id: pickNextTrackId(), isStationId: false };
}

/* Point the player at an already-fetched track: metadata, lock screen,
   and stream source. Deliberately synchronous — when a track ends while
   the phone is locked, iOS suspends the page the moment audio goes
   silent, so the advance to a prefetched track must not await anything. */
function applyLoadedTrack(trackId, data, attemptPlay, isStationId, manifestUrl) {
  // The response may not carry an id, so keep the one we requested —
  // history and shuffle both depend on currentTrack.id existing.
  currentTrack = Object.assign({ id: Number(trackId) }, data);
  currentIsStationId = !!isStationId;
  gapCounted = false; // this track hasn't earned its 30s yet
  // Station IDs are masked interstitials: broadcast branding instead of the
  // file's real title, and no SoundCloud permalink to click out to.
  currentPermalinkUrl = isStationId ? "" : (data.permalinkUrl || "");
  const shownTitle = isStationId ? "station id" : data.title;
  const shownArtist = isStationId ? "sohiradio." : data.artist;

  npTitle.textContent = shownTitle;
  setTitleLink(currentPermalinkUrl);
  npArtist.textContent = shownArtist;
  // New track, new bar — otherwise it hangs at the old track's position
  // until the first timeupdate lands.
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  requestAnimationFrame(() => { progressFill.style.transition = ''; });
  updateMediaSessionMetadata({
    title: shownTitle,
    artist: shownArtist,
    artworkUrl: isStationId ? null : data.artworkUrl,
  });

  if (attemptPlay) armPendingPlayIntent();
  const proxiedUrl = `/.netlify/functions/stream-proxy?url=${encodeURIComponent(data.streamUrl)}`;
  // A deep-prefetched manifest plays from memory (librespot's preloaded-
  // decoder handoff); the network URL stays behind as the one-shot retry
  // if the blob source dies before ever producing playback.
  blobFallbackUrl = manifestUrl ? proxiedUrl : null;
  setStreamSource(manifestUrl || proxiedUrl, attemptPlay);
}

let blobFallbackUrl = null; // network URL to retry if a blob-sourced load dies pre-playback
function tryBlobFallback() {
  if (!blobFallbackUrl) return false;
  const url = blobFallbackUrl;
  blobFallbackUrl = null;
  const wantPlay = pendingPlayIntent || isPlaying || !audioEl.paused;
  if (wantPlay) armPendingPlayIntent();
  setStreamSource(url, wantPlay);
  return true;
}

/* LoadingPlay (librespot): while a load that intends to play is in flight,
   the lock screen keeps saying "playing" — transition pauses are
   suppressed. The 15s timer is the safety net for a load that dies
   without ever firing an error: settle the UI back to the truth. */
function armPendingPlayIntent() {
  pendingPlayIntent = true;
  if (pendingPlayTimer) clearTimeout(pendingPlayTimer);
  pendingPlayTimer = setTimeout(() => {
    pendingPlayTimer = null;
    if (pendingPlayIntent && audioEl.paused) {
      pendingPlayIntent = false;
      setPlayingUI(false);
    }
  }, 15000);
}
function settlePendingPlayIntent() {
  pendingPlayIntent = false;
  if (pendingPlayTimer) { clearTimeout(pendingPlayTimer); pendingPlayTimer = null; }
}

/* Prefetch the next track's stream while the current one is still
   playing (a page playing audio keeps running in the background; a page
   in a silent gap between tracks does not — that's why auto-advance was
   dying in the car). It fires ~30s before the track ends, not at its
   start: SoundCloud stream URLs expire, and a URL fetched at the start of
   an 8-minute song could be stale by the swap. At T-30s the page is still
   audibly playing (so iOS keeps it alive for the fetch) and channel-
   surfing past a track no longer burns a prefetch. */
const PREFETCH_BEFORE_END_SEC = 30;
let nextUp = null; // { id, data, isStationId, fromForward, manifestUrl }
let prefetchInFlight = false;

/* librespot's preload isn't a URL — it's an opened decoder with the audio
   bytes already arriving (PlayerPreload::Ready), so its track-end handoff
   does zero network I/O. The browser equivalent: pull the manifest text
   down at prefetch time (warming the Netlify function + token on the way),
   nudge the first segments into the HTTP cache, and hand the swap a blob:
   URL — the silent gap after 'ended' is exactly when a locked iPhone
   kills pending fetches. Returns null on any failure: nextUp then rides
   the network URL, which is the old behavior. */
async function deepPrefetchManifest(streamUrl) {
  const resp = await fetch(`/.netlify/functions/stream-proxy?url=${encodeURIComponent(streamUrl)}`);
  if (!resp.ok) return null;
  const text = await resp.text();
  if (!text.includes('#EXTM3U')) return null;
  const urlLines = text.split('\n').map((l) => l.trim())
    .filter((l) => l && !l.startsWith('#'));
  urlLines.slice(0, 2).forEach((seg) => {
    try { fetch(seg).catch(() => {}); } catch (e) {}
  });
  // A blob manifest can't resolve relative lines — only hand one off when
  // every URL in it is absolute (stream-proxy rewrites them that way).
  if (urlLines.some((l) => !/^https?:\/\//i.test(l))) return null;
  return URL.createObjectURL(new Blob([text], { type: 'application/vnd.apple.mpegurl' }));
}

async function prefetchNextTrack() {
  if (nextUp || prefetchInFlight || queue.length < 2) return;
  prefetchInFlight = true;
  try {
    // Retracing tracks we prev'd out of takes priority over a fresh pick.
    const pick = forwardStack.length > 0
      ? { id: forwardStack[forwardStack.length - 1], isStationId: false, fromForward: true }
      : pickNext();
    const resp = await fetch(`/.netlify/functions/track-stream?id=${pick.id}`);
    if (resp.ok) {
      const data = await resp.json();
      let manifestUrl = null;
      try { manifestUrl = await deepPrefetchManifest(data.streamUrl); } catch (e) {}
      nextUp = { id: pick.id, data, isStationId: pick.isStationId, fromForward: !!pick.fromForward, manifestUrl };
    }
    // On failure nextUp stays null; nextTrack() falls back to fetching.
  } catch (e) {} finally { prefetchInFlight = false; }
}

/* Drop a prefetched-but-no-longer-next pick, returning it to the bag it
   was drawn from so nothing silently vanishes from a shuffle cycle.
   (Forward-stack picks weren't drawn from a bag — just let them go.) */
function discardNextUp() {
  if (!nextUp) return;
  if (nextUp.manifestUrl) { try { URL.revokeObjectURL(nextUp.manifestUrl); } catch (e) {} }
  if (!nextUp.fromForward) {
    if (nextUp.isStationId) {
      idShuffleBag.unshift(nextUp.id);
      songsUntilStationId = 0; // the gap already reset when this ID was picked
    } else {
      shuffleBag.unshift(nextUp.id);
    }
  }
  nextUp = null;
}

let loadSeq = 0; // guards against rapid skips resolving out of order
async function loadAndPlayTrack(trackId, attemptPlay, isStationId) {
  const seq = ++loadSeq;
  // The whole CONNECTING window counts as LoadingPlay: a skip's fetch must
  // not read as "paused" on the lock screen.
  if (attemptPlay) armPendingPlayIntent();
  npLabel.textContent = 'connecting';
  npTitle.textContent = "tuning in...";
  setTitleLink(false);   // status text, not a linkable track
  try {
    const resp = await fetch(`/.netlify/functions/track-stream?id=${trackId}`);
    if (seq !== loadSeq) return; // a newer selection superseded this one
    if (!resp.ok) {
      const errBody = await resp.json().catch(() => ({}));
      throw new Error(errBody.error || `track-stream failed: ${resp.status}`);
    }
    const data = await resp.json();
    if (seq !== loadSeq) return;
    applyLoadedTrack(trackId, data, attemptPlay, isStationId);
  } catch (err) {
    if (seq !== loadSeq) return;
    console.error(err);
    npTitle.textContent = "couldn't play this track";
    setTitleLink(false);   // status text, not a linkable track
    npArtist.textContent = err.message || "";
    npLabel.textContent = 'standby';
    // Try a different track rather than getting stuck on one that failed —
    // but give up after a few strikes so two dead tracks can't ping-pong
    // requests forever.
    failureStreak++;
    if (queue.length > 1 && failureStreak < Math.min(queue.length, 5)) {
      setTimeout(() => {
        const pick = pickNext();
        loadAndPlayTrack(pick.id, attemptPlay, pick.isStationId);
      }, 800);
    } else {
      // Giving up: settle the playing state too, or the visualizer keeps
      // dancing and the lock screen keeps a pause button over dead air.
      settlePendingPlayIntent();
      setPlayingUI(false);
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
      npTitle.textContent = "stream trouble — tap play to retry";
      setTitleLink(false);   // status text, not a linkable track
      failureStreak = 0;
    }
  }
}

function playRandomTrack() {
  hasStarted = true;
  const pick = pickNext();
  loadAndPlayTrack(pick.id, true, pick.isStationId);
}

function updateMediaSessionMetadata(track) {
  // Keep the plain object around: iOS sometimes drops metadata that was
  // set before the element actually played, so 'playing' re-asserts it
  // (a fresh MediaMetadata instance is what forces iOS to re-read).
  lastMediaMetadata = track;
  if (!('mediaSession' in navigator)) return;
  let artwork = [];
  if (track.artworkUrl) {
    artwork = [{ src: track.artworkUrl, sizes: '500x500', type: 'image/jpeg' }];
  }
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title || "untitled",
    artist: track.artist || "sohiradio",
    album: "sohiradio.",
    artwork: artwork,
  });
}

/* iOS quirk: action handlers registered before any audio has played are
   often ignored, which leaves the lock screen showing generic ±10s skip
   buttons. Registering is idempotent, so we (re)apply on every 'playing'
   event as well as once up front. */
function applyMediaSessionHandlers() {
  if (!('mediaSession' in navigator)) return;
  const ms = navigator.mediaSession;
  try {
    // Flip playbackState optimistically: the lock screen button waits for
    // it, and in a backgrounded (throttled) page the element's own
    // play/pause events can take a beat to round-trip. setPlayingUI still
    // settles the real state right after.
    ms.setActionHandler('play', () => { ms.playbackState = 'playing'; startOrToggle(true); });
    ms.setActionHandler('pause', () => { ms.playbackState = 'paused'; startOrToggle(false); });
    ms.setActionHandler('previoustrack', () => previousTrack());
    ms.setActionHandler('nexttrack', () => nextTrack());
  } catch (e) {}
  // 'seekto' isn't supported everywhere — don't let it break the others.
  // The handler body gets its own try/catch: the outer one only protects
  // registration, and the callback runs much later.
  try {
    ms.setActionHandler('seekto', (details) => {
      try {
        if (!isFinite(audioEl.duration)) return;
        const t = Math.min(Math.max(details.seekTime || 0, 0), audioEl.duration);
        if (details.fastSeek && 'fastSeek' in audioEl) {
          audioEl.fastSeek(t);
        } else {
          audioEl.currentTime = t;
        }
        // fastSeek may not fire 'seeked' synchronously — push the anchor
        // now; a duplicate push from the seeked listener is harmless.
        updatePositionState();
      } catch (e) {}
    });
  } catch (e) {}
  // Explicitly unset the ±15s handlers so iOS favors prev/next buttons.
  try {
    ms.setActionHandler('seekbackward', null);
    ms.setActionHandler('seekforward', null);
  } catch (e) {}
}
applyMediaSessionHandlers();

/* Anchor the lock-screen progress bar (librespot's model): push a
   {position, rate, duration} anchor and let the OS extrapolate. Pushes
   happen on events — play, pause, seek, duration known — plus a drift
   check; steady playback pushes nothing, which is exactly what keeps the
   iOS scrubber from stuttering. */
let lastSessionSave = 0;
function updatePositionState() {
  if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState) return;
  if (!isFinite(audioEl.duration) || audioEl.duration <= 0) return;
  navigator.mediaSession.setPositionState({
    duration: audioEl.duration,
    playbackRate: audioEl.playbackRate || 1,
    position: Math.min(audioEl.currentTime, audioEl.duration),
  });
  posAnchor = { at: Date.now(), pos: audioEl.currentTime };
}

function nextTrack(forcePlay) {
  if (queue.length === 0) return;
  // Station IDs always play out: user skips (button or lock screen) are
  // ignored; only the track-end auto-advance (forcePlay) moves past one.
  if (currentIsStationId && !forcePlay) return;
  // Station IDs stay out of history so prev never returns to one.
  if (!currentIsStationId && currentTrack && currentTrack.id != null && !isNaN(currentTrack.id)) {
    history.push(currentTrack.id);
    if (history.length > MAX_HISTORY) history.shift();
  }
  // forcePlay covers track-end auto-advance. Transition suppression keeps
  // isPlaying true through the ended-pause these days, so either operand
  // carries it — forcePlay stays as belt-and-suspenders.
  const shouldPlay = forcePlay || isPlaying || !hasStarted;
  // After prev, forward moves (button or auto-advance) retrace the tracks
  // we backed out of before the radio draws anything new — Spotify walks
  // its queue the same way.
  if (forwardStack.length > 0) {
    const id = forwardStack.pop();
    if (nextUp && nextUp.fromForward && nextUp.id === id) {
      const up = nextUp;
      nextUp = null;
      loadSeq++; // invalidate any older in-flight loads
      applyLoadedTrack(up.id, up.data, shouldPlay, false, up.manifestUrl);
    } else {
      discardNextUp(); // prefetched for a different position in the stream
      loadAndPlayTrack(id, shouldPlay, false);
    }
    return;
  }
  if (nextUp) {
    const up = nextUp;
    nextUp = null;
    loadSeq++; // invalidate any older in-flight loads
    applyLoadedTrack(up.id, up.data, shouldPlay, up.isStationId, up.manifestUrl);
  } else {
    const pick = pickNext();
    loadAndPlayTrack(pick.id, shouldPlay, pick.isStationId);
  }
}

/* Spotify's prev rule (librespot spirc handle_prev): more than 3s into a
   track, prev restarts it — a seek to 0, instant, no network, play/pause
   status untouched. Under 3s it goes back for real. With nothing to go
   back to, it restarts too. */
const PREV_RESTART_THRESHOLD_SEC = 3;
function previousTrack() {
  if (currentIsStationId) return; // IDs always play out
  if (audioEl.currentTime > PREV_RESTART_THRESHOLD_SEC) {
    audioEl.currentTime = 0; // 'seeked' re-anchors the lock screen
    return;
  }
  // Skip over any unusable entries (older sessions could store undefined).
  while (history.length > 0) {
    const id = history.pop();
    if (id != null && !isNaN(id)) {
      // Leave a trail forward so next/auto-advance return through the
      // tracks we backed out of instead of drawing new random ones.
      if (currentTrack && currentTrack.id != null && !isNaN(currentTrack.id)) {
        forwardStack.push(currentTrack.id);
        if (forwardStack.length > MAX_HISTORY) forwardStack.shift();
      }
      // Whatever was prefetched belongs after the track we just left, not
      // after the one we're going back to — re-prefetch from here.
      discardNextUp();
      loadAndPlayTrack(id, isPlaying || !hasStarted, false);
      return;
    }
  }
  audioEl.currentTime = 0; // 'seeked' re-anchors the lock screen
}

function formatTime(s) {
  if (!isFinite(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function setPlayingUI(playing) {
  isPlaying = playing;
  playTile.classList.toggle('active', playing);
  pauseTile.classList.toggle('active', !playing);
  npLabel.textContent = playing ? 'on air' : 'paused';
  npIcon.textContent = playing ? '●' : '◌';
  statusText.textContent = playing ? '● live' : '○ standby';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
  }
}
setPlayingUI(false);

audioEl.addEventListener('play', () => setPlayingUI(true));
audioEl.addEventListener('pause', () => {
  // Transition pause — the element auto-pauses right before 'ended', and a
  // load-with-intent-to-play may be in flight after a skip. The radio
  // hasn't stopped, it's changing songs: report nothing (librespot's
  // LoadingPlay — Spotify's play button never flickers during an advance).
  // Don't checkpoint the session here either, or a kill at exactly this
  // moment would reopen replaying the last 2s of the finished song.
  // Side effect worth knowing: a call landing mid-transition gets its
  // pause suppressed too; the new track's play() then rejects and the cue
  // settles the UI — the user just taps play.
  const nearEnd = audioEl.ended ||
    (isFinite(audioEl.duration) && audioEl.duration - audioEl.currentTime < 0.5);
  if (!userPauseIntent && hasStarted && (nearEnd || pendingPlayIntent)) return;
  // A real pause: settle the UI, freeze the lock-screen position once,
  // persist, then classify who asked for it.
  setPlayingUI(false);
  pausedAt = Date.now();
  pendingPlayIntent = false;
  updatePositionState();
  saveSession();
  if (userPauseIntent) {
    // The listener chose this pause — it must never auto-resume.
    userPauseIntent = false;
    systemInterrupted = false;
    return;
  }
  if (!hasStarted) return;
  // Paused by the system: a call, Siri, Bluetooth/headphones dropping, iOS
  // reclaiming audio. Native music apps resume when the interruption ends —
  // remember it so we can do the same.
  systemInterrupted = true;
  interruptedAt = Date.now();
});
// Before hasStarted the only thing that can end is the ~2ms silent unlock
// blip — advancing on it would race the boot preload with a second load.
audioEl.addEventListener('ended', () => { if (hasStarted) nextTrack(true); });
// Every seek — lock-screen scrub, prev-restart, resume-at-position — and
// every freshly-known duration re-anchors the lock-screen scrubber.
audioEl.addEventListener('seeked', () => updatePositionState());
audioEl.addEventListener('durationchange', () => updatePositionState());
audioEl.addEventListener('playing', () => {
  setPlayingUI(true); // restores ON AIR after a BUFFERING spell ('play' won't re-fire)
  blobFallbackUrl = null; // the blob manifest produced real playback
  failureStreak = 0;
  resumeAttempted = false; // real playback again — earn back one resume
  systemInterrupted = false;
  offlineHold = null;
  settlePendingPlayIntent(); // the LoadingPlay transition landed
  pausedAt = 0;
  resumingSince = 0;
  applyMediaSessionHandlers();
  // Re-assert metadata too: iOS sometimes drops what was set pre-playback.
  if (lastMediaMetadata) updateMediaSessionMetadata(lastMediaMetadata);
  updatePositionState();
  // Normalization graph spins up on first real playback (autoplay policy
  // keeps a fresh AudioContext suspended until audio is actually allowed).
  initNormalization();
  if (normalizationCtx && normalizationCtx.state === 'suspended') {
    normalizationCtx.resume().catch(() => {});
  }
});
/* Rebuffering shorter than the 10s stall watchdog used to be invisible —
   ON AIR over silence. 'waiting' means playback is actually blocked on
   data; 'stalled' only counts when the buffer is genuinely empty
   (readyState < HAVE_FUTURE_DATA), because browsers fire it benignly
   while playing happily from a full buffer. Deliberately does NOT touch
   isPlaying or the lock screen: a stall is not a pause (librespot reports
   it the same way). The 'playing' listener above restores ON AIR. */
function showBuffering() {
  if (!hasStarted || !isPlaying || audioEl.paused) return;
  npLabel.textContent = 'buffering';
  npIcon.textContent = '◌';
}
audioEl.addEventListener('waiting', showBuffering);
audioEl.addEventListener('stalled', () => {
  if (audioEl.readyState < 3) showBuffering();
});
// Native HLS playback (Safari) surfaces failures on the element itself;
// in hls.js mode errors arrive via the Hls ERROR event instead.
audioEl.addEventListener('error', () => {
  if (!supportsNativeHls) return;
  handlePlaybackError(`media element error: ${audioEl.error && audioEl.error.code}`);
});
audioEl.addEventListener('timeupdate', () => {
  curTime.textContent = formatTime(audioEl.currentTime);
  if (isFinite(audioEl.duration)) {
    durTime.textContent = formatTime(audioEl.duration);
    progressFill.style.width = Math.min(100, (audioEl.currentTime / audioEl.duration) * 100) + '%';
  }
  // A song counts toward the next station ID only once it has genuinely
  // played for a while — skipped-past tracks don't advance the gap.
  if (!gapCounted && hasStarted && !currentIsStationId && audioEl.currentTime >= GAP_COUNT_AT_SEC) {
    gapCounted = true;
    songsUntilStationId--;
  }
  // Prefetch the next track once this one is inside its final 30 seconds.
  // Tracks shorter than that — station IDs especially — prefetch as soon
  // as their (short) duration is known, so even a 10s ID has most of its
  // length for the fetch to land before the silent gap. Duration is
  // briefly NaN right after every source swap; firing on that would
  // prefetch the next track at the START of every song — hours early on a
  // long one, exactly the stream-URL staleness T-30s exists to avoid. So
  // unknown duration only prefetches after a 5s grace (never risk reaching
  // 'ended' empty-handed if the manifest truly never settles, because a
  // fetch during silence dies on a locked phone).
  // nextUp/prefetchInFlight make repeat firings a no-op.
  if (isPlaying && (isFinite(audioEl.duration)
      ? audioEl.duration - audioEl.currentTime < PREFETCH_BEFORE_END_SEC
      : audioEl.currentTime >= 5)) {
    prefetchNextTrack();
  }
  // librespot's anchor model: the lock screen extrapolates position on its
  // own; re-push only when reality has drifted ≥1s from what it's showing
  // (a buffering stall, a rate hiccup). Steady playback pushes nothing.
  const now = Date.now();
  if (isPlaying) {
    if (!posAnchor) {
      updatePositionState(); // first push after a source swap
    } else {
      const expected = posAnchor.pos +
        ((now - posAnchor.at) / 1000) * (audioEl.playbackRate || 1);
      if (Math.abs(expected - audioEl.currentTime) > POSITION_DRIFT_SEC) {
        updatePositionState();
      }
    }
  }
  // Checkpoint the session every ~10s so a killed tab reopens mid-song.
  if (now - lastSessionSave > 10000) {
    lastSessionSave = now;
    saveSession();
  }
});

function startOrToggle(forcePlay) {
  if (queue.length === 0) return;
  if (!hasStarted && forcePlay) { playRandomTrack(); return; }
  if (forcePlay) {
    systemInterrupted = false;
    // Paused long enough that the SoundCloud stream URL has expired —
    // a plain play() would fail silently or error into a skip. Refetch
    // this same track at this same position instead (Spotify resumes the
    // song you paused, always).
    if (currentTrack && pausedAt && Date.now() - pausedAt > STALE_RESUME_MS) {
      startInPlaceResume(audioEl.currentTime);
      return;
    }
    playWithFade();
  } else {
    pauseWithFade();
  }
}

playTile.addEventListener('click', () => startOrToggle(true));
pauseTile.addEventListener('click', () => startOrToggle(false));
document.getElementById('prevBtn').addEventListener('click', () => previousTrack());
document.getElementById('skipBtn').addEventListener('click', () => nextTrack());

npTitle.addEventListener('click', () => {
  if (currentPermalinkUrl) window.open(currentPermalinkUrl, '_blank', 'noopener');
});

/* ---------- INTERRUPTION RECOVERY ----------
   A system pause (call, Siri, Bluetooth dropping) should end the way it
   does in Spotify: playback comes back on its own the moment the world
   does. A deliberate user pause never auto-resumes. Deliberately NOT
   wired to visibility/focus: Spotify never resumes just because the app
   came to the foreground — if iOS paused us so another app could play,
   returning to the browser must not blast music over it. */
const INTERRUPT_RESUME_WINDOW_MS = 30 * 60 * 1000;
function tryResumeAfterInterruption() {
  // Offline hold outranks everything: the stream is dead, play() won't fix
  // it — refetch the same track at the parked position instead.
  if (offlineHold && navigator.onLine !== false && currentTrack) {
    const hold = offlineHold;
    offlineHold = null;
    resumeAttempted = false;
    resumeCurrentTrackAt(hold.at);
    return;
  }
  if (!systemInterrupted || !hasStarted || !audioEl.paused) return;
  if (Date.now() - interruptedAt > INTERRUPT_RESUME_WINDOW_MS) {
    systemInterrupted = false; // too long ago — treat it like a real pause
    return;
  }
  // A long interruption has an equally dead stream URL as a long pause.
  if (currentTrack && pausedAt && Date.now() - pausedAt > STALE_RESUME_MS) {
    startInPlaceResume(audioEl.currentTime);
    return;
  }
  playWithFade(); // rejection is fine; the next trigger tries again
}
// The audio session flips back to 'active' when a call/Siri ends — the
// exact signal native apps resume on.
try {
  if (navigator.audioSession) {
    navigator.audioSession.addEventListener('statechange', () => {
      if (navigator.audioSession.state === 'active') tryResumeAfterInterruption();
    });
  }
} catch (e) {}
// Audio outputs changed — Bluetooth/AirPods reconnecting mid-interruption.
try {
  if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
    navigator.mediaDevices.addEventListener('devicechange', () => tryResumeAfterInterruption());
  }
} catch (e) {}
window.addEventListener('online', () => tryResumeAfterInterruption());

/* Stall watchdog: native HLS (and occasionally hls.js) can hang forever on
   a network transition — wifi dropping to cellular in the car — without
   ever firing an error. If the UI says playing but the playhead hasn't
   moved in 10s, treat it as a stream death; the in-place resume machinery
   brings the same track back at the same position. */
const STALL_TIMEOUT_MS = 10000;
let lastProgressPos = -1;
let lastProgressAt = 0;
setInterval(() => {
  if (!isPlaying || !hasStarted || audioEl.paused || offlineHold) { lastProgressPos = -1; return; }
  if (audioEl.currentTime !== lastProgressPos) {
    lastProgressPos = audioEl.currentTime;
    lastProgressAt = Date.now();
    return;
  }
  if (Date.now() - lastProgressAt > STALL_TIMEOUT_MS) {
    lastProgressPos = -1;
    handlePlaybackError('stall watchdog: playhead frozen');
  }
}, 2000);

/* ---------- SESSION CONTINUITY ----------
   Spotify reopens on the song you left, at the position you left it,
   paused and ready. Persist just enough to do the same. Station IDs are
   never a landing spot: a session that closed during one restores to a
   fresh pick instead (the ID pool has its own rules). */
const STATE_KEY = 'sohiradio.state.v1';
function saveSession() {
  if (!hasStarted || !currentTrack) return;
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      trackId: currentIsStationId ? null : currentTrack.id,
      pos: currentIsStationId ? 0 : audioEl.currentTime,
      at: Date.now(),
      history: history.slice(-MAX_HISTORY),
      forwardStack: forwardStack.slice(-MAX_HISTORY),
      songsUntilStationId: songsUntilStationId,
    }));
  } catch (e) {}
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY) || 'null'); } catch (e) { return null; }
}
window.addEventListener('pagehide', saveSession);

/* ---------- AIRPLAY ----------
   Safari (macOS + iOS) can route the <audio> element's output to AirPlay
   speakers; the button only appears once the browser reports a routable
   target nearby. Chrome/Firefox take the standard Remote Playback API
   branch (Cast, if anything) or, lacking both APIs, never show it. */
audioEl.setAttribute('x-webkit-airplay', 'allow');
const airplayBtn = document.getElementById('airplayBtn');
if (window.WebKitPlaybackTargetAvailabilityEvent) {
  audioEl.addEventListener('webkitplaybacktargetavailabilitychanged', (e) => {
    airplayBtn.classList.toggle('available', e.availability === 'available');
  });
  airplayBtn.addEventListener('click', () => {
    audioEl.webkitShowPlaybackTargetPicker();
  });
} else if (!normalizationEnabled &&
    audioEl.remote && typeof audioEl.remote.watchAvailability === 'function') {
  // Remote Playback (Cast) streams the ELEMENT's output, which the
  // normalization graph captures — casting would cast silence. Where
  // normalization runs, the button stays hidden.
  audioEl.remote.watchAvailability((available) => {
    airplayBtn.classList.toggle('available', available);
  }).catch(() => {}); // rejects where remote playback is disallowed — stay hidden
  airplayBtn.addEventListener('click', () => {
    audioEl.remote.prompt().catch(() => {});
  });
}

/* ---------- CLOCK + TIMEZONE (bottom caption) ----------
   Local time with the zone's short name ("10:46 am cdt") — re-derived
   every tick so a DST flip mid-session renames itself. Zones without a
   real abbreviation come back as "gmt+2"-style, which is fine. */
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();
  let zone = '';
  try {
    const part = new Intl.DateTimeFormat([], { timeZoneName: 'short' })
      .formatToParts(now).find((p) => p.type === 'timeZoneName');
    zone = part ? part.value.toLowerCase() : '';
  } catch (e) {}
  document.getElementById('clockCaption').textContent = zone ? `${time} ${zone}` : time;
}
updateClock();
setInterval(updateClock, 1000);

/* ---------- WORDMARK EASTER EGG ----------
   Each tap plays the next animation in the ring, then cleans up after
   itself so the next tap starts from a settled wordmark. */
const FX = ['fx-glitch', 'fx-stretch', 'fx-invert', 'fx-tilt', 'fx-echo', 'fx-flip'];
const wordmarkEl = document.querySelector('.wordmark');
let fxIndex = -1;

function clearFx() { FX.forEach((c) => wordmarkEl.classList.remove(c)); }

wordmarkEl.addEventListener('click', () => {
  clearFx();
  void wordmarkEl.offsetWidth;   // reflow, so re-tapping the same class restarts it
  fxIndex = (fxIndex + 1) % FX.length;
  wordmarkEl.classList.add(FX[fxIndex]);
});
wordmarkEl.addEventListener('animationend', clearFx);

/* ---------- AUTOPLAY FALLBACK ----------
   Mobile browsers block sound autoplay before any user interaction. The
   entry tap lives on the boot screen ONLY — once it's gone, no stray tap
   on the player chrome can start or otherwise touch the station. If a
   later play() is blocked, a "tap play to tune in" cue appears and the
   play tile is the way in. */
const tapCue = document.getElementById('tapCue');
function showTapCue() { tapCue.classList.add('visible'); }
function hideTapCue() { tapCue.classList.remove('visible'); }

/* NotAllowedError is specifically "gesture required" — other rejections
   (e.g. a play() aborted by a rapid skip) shouldn't summon the cue.
   A blocked play also ends any LoadingPlay transition: the lock screen
   must settle back to the truth instead of claiming "playing" forever. */
function showCueIfBlocked(err) {
  if (err && err.name === 'NotAllowedError') {
    settlePendingPlayIntent();
    setPlayingUI(false);
    showTapCue();
  }
}

/* ~2ms of silence. Playing it inside a tap handler marks the <audio>
   element as user-activated on iOS, so a later programmatic play() (once
   the playlist has actually loaded) is allowed through. */
const SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';

function unlockAutoplay() {
  if (isPlaying) return;
  bootTapped = true;
  if (!bootReady && !hasStarted) {
    // Boot-screen tap before the first track is ready: nothing to play
    // yet. Spend the gesture unlocking the element so the programmatic
    // play() succeeds the moment the preload settles.
    if (!audioEl.src) {
      audioEl.src = SILENT_WAV;
      audioEl.play().catch(() => {});
    }
    const bootCue = document.getElementById('bootCue');
    if (bootCue) bootCue.textContent = 'starting…';
    return;
  }
  hideBootScreen();
  hideTapCue();
  if (!hasStarted) {
    hasStarted = true;
    if (!currentTrack) { playRandomTrack(); return; } // preload failed — fetch fresh
    // The source is already loaded, so this starts immediately.
    audioEl.play().catch((err) => {
      if (err && err.name === 'NotAllowedError') { showTapCue(); return; }
      // Most likely the prefetched stream URL expired while the visitor
      // idled on the boot screen — fetch a fresh one.
      loadAndPlayTrack(currentTrack.id, true, currentIsStationId);
    });
  } else {
    audioEl.play().catch(() => {});
  }
}
/* Disarm on the first successful start, not on first tap: a tap during the
   boot screen (before the queue exists) must not burn the listeners. After
   playback has started once, taps must never resume a deliberate pause.
   The silent unlock blip plays before hasStarted — it doesn't count. */
const bootScreenEl = document.getElementById('bootScreen');
audioEl.addEventListener('playing', () => {
  hideTapCue();
  if (!hasStarted) return;
  bootScreenEl.removeEventListener('touchstart', unlockAutoplay);
  bootScreenEl.removeEventListener('click', unlockAutoplay);
});
bootScreenEl.addEventListener('touchstart', unlockAutoplay, { passive: true });
bootScreenEl.addEventListener('click', unlockAutoplay);
</script>

</body>
