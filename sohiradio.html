<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sohiradio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0A0A0A;
  --panel: #141416;
  --panel-2: #1C1C1F;
  --line: #2A2A2D;
  --text: #F5F3EE;
  --text-dim: #7A7A7E;
  --accent: #C9A227;
  --accent-dim: #6b5a1a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}

/* grain overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.05;
  z-index: 999;
  background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSdub2lzZSc+PGZlVHVyYnVsZW5jZSB0eXBlPSdmcmFjdGFsTm9pc2UnIGJhc2VGcmVxdWVuY3k9JzAuOScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScxMDAlJyBoZWlnaHQ9JzEwMCUnIGZpbHRlcj0ndXJsKCNub2lzZSknLz48L3N2Zz4=");
}

.window {
  width: 100%;
  max-width: 520px;
  background: var(--panel);
  border: 1px solid var(--line);
  position: relative;
}

/* titlebar */
.titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
}

.titlebar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--line);
}
.dot.live {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.titlebar-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}

.titlebar-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* body */
.content {
  padding: 32px 28px 24px;
}

.wordmark {
  font-weight: 700;
  font-size: 34px;
  letter-spacing: -0.02em;
  line-height: 1;
  text-transform: lowercase;
}

.wordmark span {
  color: var(--accent);
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 6px;
}

/* dial */
.dial-row {
  display: flex;
  align-items: center;
  gap: 24px;
  margin: 32px 0 28px;
}

.dial-wrap {
  position: relative;
  width: 108px;
  height: 108px;
  flex-shrink: 0;
  cursor: pointer;
}

.dial-wrap svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.dial-track {
  fill: none;
  stroke: var(--line);
  stroke-width: 1;
}

.dial-tick {
  stroke: var(--line);
  stroke-width: 1;
}

.dial-needle {
  transform-origin: 54px 54px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.dial-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--panel-2);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: box-shadow 0.3s;
}

.dial-wrap.playing .dial-center {
  box-shadow: 0 0 14px rgba(201, 162, 39, 0.35);
  border-color: var(--accent-dim);
}

.dial-center svg { width: 14px; height: 14px; }

.now-playing {
  flex: 1;
  min-width: 0;
}

.np-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.np-title {
  font-weight: 500;
  font-size: 16px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.np-artist {
  font-size: 12.5px;
  color: var(--text-dim);
  margin-top: 2px;
}

.np-file {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.6;
  margin-top: 8px;
}

/* waveform */
.wave-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}

.wave {
  flex: 1;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 2px;
  overflow: hidden;
}

.wave-bar {
  width: 2px;
  background: var(--line);
  border-radius: 1px;
  transition: background 0.3s;
}

.wave-bar.active { background: var(--accent-dim); }

.time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  min-width: 32px;
}

/* controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.vol-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.vol-row input[type="range"] {
  -webkit-appearance: none;
  width: 70px;
  height: 2px;
  background: var(--line);
  outline: none;
}

.vol-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 9px;
  height: 9px;
  background: var(--text);
  cursor: pointer;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  padding: 4px;
}
.icon-btn:hover { color: var(--text); }
.icon-btn svg { width: 15px; height: 15px; }

/* schedule strip */
.schedule {
  border-top: 1px solid var(--line);
  padding: 16px 28px;
  background: var(--panel-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.schedule-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.schedule-show {
  font-size: 13px;
  font-weight: 500;
  margin-top: 3px;
}

.schedule-show span { color: var(--accent); }

.countdown {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  text-align: right;
}

.countdown-label {
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

/* history */
.history {
  padding: 16px 28px 22px;
}

.history-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

.history-item {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line);
  color: var(--text-dim);
}
.history-item:last-child { border-bottom: none; }
.history-item .h-title { color: var(--text); }
.history-item .h-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}

@media (max-width: 480px) {
  .content { padding: 26px 20px 20px; }
  .schedule, .history { padding-left: 20px; padding-right: 20px; }
  .dial-row { gap: 16px; }
}
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="dot live" id="liveDot"></div>
      <div class="titlebar-text">sohiradio.stream — v0.1</div>
    </div>
    <div class="titlebar-status">
      <span id="statusText">● LIVE</span>
    </div>
  </div>

  <div class="content">
    <div class="wordmark">sohi<span>radio</span></div>
    <div class="tagline">24hr transmission / est. dallas</div>

    <div class="dial-row">
      <div class="dial-wrap" id="dialWrap" title="play / pause">
        <svg viewBox="0 0 108 108">
          <circle class="dial-track" cx="54" cy="54" r="48"></circle>
          <g id="ticks"></g>
          <line id="needle" class="dial-needle" x1="54" y1="54" x2="54" y2="12" stroke="#C9A227" stroke-width="2"></line>
        </svg>
        <div class="dial-center">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </div>
      </div>

      <div class="now-playing">
        <div class="np-label"><span id="npIcon">◌</span> <span id="npLabel">STANDBY</span></div>
        <div class="np-title" id="npTitle">tap the dial to tune in</div>
        <div class="np-artist" id="npArtist">sohiradio</div>
        <div class="np-file" id="npFile">track_000.mp3</div>
      </div>
    </div>

    <div class="wave-row">
      <span class="time" id="curTime">0:00</span>
      <div class="wave" id="wave"></div>
      <span class="time" id="durTime">0:00</span>
    </div>

    <div class="controls">
      <div class="vol-row">
        <button class="icon-btn" id="muteBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        </button>
        <input type="range" id="volSlider" min="0" max="100" value="70">
      </div>
      <button class="icon-btn" id="skipBtn" title="next track">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14l8-7-8-7zM16 5v14h2V5h-2z"/></svg>
      </button>
    </div>
  </div>

  <div class="schedule">
    <div>
      <div class="schedule-label">up next</div>
      <div class="schedule-show">the electric hour <span>w/ IT DEPT</span></div>
    </div>
    <div class="countdown">
      <div id="countdownTime">--:--:--</div>
      <div class="countdown-label">until air</div>
    </div>
  </div>

  <div class="history">
    <div class="history-label">recently played</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// Real tracks pulled from timmyarisa's SoundCloud likes — swap/reorder freely,
// or point this at a dedicated "sohiradio" playlist once you build one.
const playlist = [
  { url: "https://soundcloud.com/isaiahvelez/childlike-freestyle-feat-bern", file: "track_101.mp3" },
  { url: "https://soundcloud.com/santo_vuelo/the-gap-pt-2-w-steph-simon", file: "track_102.mp3" },
  { url: "https://soundcloud.com/forever-childish2/eat-your-vegetables-prod", file: "track_103.mp3" },
];

let curIndex = 0;
let isPlaying = false;
let widget = null;
let trackDuration = 0;
const dialWrap = document.getElementById('dialWrap');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const npLabel = document.getElementById('npLabel');
const npIcon = document.getElementById('npIcon');
const npTitle = document.getElementById('npTitle');
const npArtist = document.getElementById('npArtist');
const npFile = document.getElementById('npFile');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const needle = document.getElementById('needle');
const statusText = document.getElementById('statusText');
const historyList = document.getElementById('historyList');
const history = [];

// hidden SoundCloud widget — real playback, zero visible SC chrome
const iframe = document.createElement('iframe');
iframe.id = 'sc-widget';
iframe.style.cssText = 'width:1px;height:1px;position:absolute;top:-9999px;left:-9999px;border:0;';
iframe.allow = 'autoplay';
iframe.src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(playlist[0].url) +
  '&auto_play=false&show_artwork=false&visual=false&buying=false&liking=false&sharing=false&download=false';
document.body.appendChild(iframe);

npTitle.textContent = "loading track info...";

const scScript = document.createElement('script');
scScript.src = 'https://w.soundcloud.com/player/api.js';
scScript.onload = initWidget;
document.head.appendChild(scScript);

function initWidget() {
  widget = SC.Widget(iframe);

  widget.bind(SC.Widget.Events.READY, () => {
    refreshTrackInfo();
    widget.setVolume(70);
  });

  widget.bind(SC.Widget.Events.PLAY, () => setPlayingUI(true));
  widget.bind(SC.Widget.Events.PAUSE, () => setPlayingUI(false));
  widget.bind(SC.Widget.Events.FINISH, () => nextTrack());

  widget.bind(SC.Widget.Events.PLAY_PROGRESS, (data) => {
    const progress = data.relativePosition || 0;
    curTime.textContent = formatTime(data.currentPosition / 1000);
    if (trackDuration) durTime.textContent = formatTime(trackDuration / 1000);
    const activeCount = Math.floor(progress * barCount);
    bars.forEach((bar, i) => bar.classList.toggle('active', i < activeCount));
    needle.setAttribute('transform', `rotate(${progress * 360} 54 54)`);
  });
}

function refreshTrackInfo() {
  widget.getCurrentSound((sound) => {
    npTitle.textContent = sound.title || "untitled";
    npArtist.textContent = (sound.user && sound.user.username) || "unknown artist";
    npFile.textContent = playlist[curIndex].file;
  });
  widget.getDuration((ms) => { trackDuration = ms; durTime.textContent = formatTime(ms / 1000); });
}

function nextTrack() {
  addToHistory();
  curIndex = (curIndex + 1) % playlist.length;
  widget.load(playlist[curIndex].url, {
    auto_play: isPlaying,
    show_artwork: false,
    visual: false,
    callback: refreshTrackInfo
  });
}

// build tick marks around dial
const ticksEl = document.getElementById('ticks');
for (let i = 0; i < 24; i++) {
  const angle = (i / 24) * 360;
  const rad = (angle * Math.PI) / 180;
  const r1 = 48, r2 = 43;
  const x1 = 54 + r1 * Math.cos(rad);
  const y1 = 54 + r1 * Math.sin(rad);
  const x2 = 54 + r2 * Math.cos(rad);
  const y2 = 54 + r2 * Math.sin(rad);
  const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
  tick.setAttribute("x1", x1); tick.setAttribute("y1", y1);
  tick.setAttribute("x2", x2); tick.setAttribute("y2", y2);
  tick.setAttribute("class", "dial-tick");
  ticksEl.appendChild(tick);
}

// build waveform bars
const waveEl = document.getElementById('wave');
const barCount = 60;
const bars = [];
for (let i = 0; i < barCount; i++) {
  const bar = document.createElement('div');
  bar.className = 'wave-bar';
  const h = 4 + Math.random() * 20;
  bar.style.height = h + 'px';
  waveEl.appendChild(bar);
  bars.push(bar);
}

function formatTime(s) {
  if (!isFinite(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function setPlayingUI(playing) {
  isPlaying = playing;
  dialWrap.classList.toggle('playing', playing);
  playIcon.style.display = playing ? 'none' : 'block';
  pauseIcon.style.display = playing ? 'block' : 'none';
  npLabel.textContent = playing ? 'ON AIR' : 'PAUSED';
  npIcon.textContent = playing ? '●' : '◌';
  statusText.textContent = playing ? '● LIVE' : '○ STANDBY';
}

dialWrap.addEventListener('click', () => {
  if (!widget) return;
  if (isPlaying) widget.pause();
  else widget.play();
});

document.getElementById('skipBtn').addEventListener('click', () => {
  if (!widget) return;
  nextTrack();
});

function addToHistory() {
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  history.unshift({ title: npTitle.textContent, time });
  if (history.length > 4) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-item" style="color:var(--text-dim)">nothing played yet</div>';
    return;
  }
  historyList.innerHTML = history.map(h =>
    `<div class="history-item"><span class="h-title">${h.title}</span><span class="h-time">${h.time}</span></div>`
  ).join('');
}
renderHistory();

// volume
let lastVolume = 70;
let isMuted = false;
const volSlider = document.getElementById('volSlider');
volSlider.addEventListener('input', () => {
  if (!widget) return;
  lastVolume = volSlider.value;
  widget.setVolume(Number(volSlider.value));
});

document.getElementById('muteBtn').addEventListener('click', () => {
  if (!widget) return;
  isMuted = !isMuted;
  widget.setVolume(isMuted ? 0 : Number(volSlider.value || lastVolume));
});

// idle needle drift when nothing playing
setInterval(() => {
  if (!isPlaying) {
    const t = Date.now() / 4000;
    const idle = Math.sin(t) * 8;
    needle.setAttribute('transform', `rotate(${idle} 54 54)`);
  }
}, 100);

// countdown to next Electric Hour — assume Thursdays 7pm local, adjust as needed
function updateCountdown() {
  const now = new Date();
  const target = new Date();
  const dayDiff = (4 - now.getDay() + 7) % 7; // 4 = Thursday
  target.setDate(now.getDate() + dayDiff);
  target.setHours(19, 0, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 7);
  const diff = target - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdownTime').textContent =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
